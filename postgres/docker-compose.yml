services:
  opencodeco-postgres:
    container_name: opencodeco-postgres
    image: postgres:17.4
    restart: always
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - opencodeco-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  opencodeco-pgadmin:
    container_name: opencodeco-pgadmin
    image: dpage/pgadmin4:9.2
    ports:
      - ${PGADMIN_PORT}:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    depends_on:
      opencodeco-postgres:
        condition: service_healthy

networks:
  default:
    name: opencodeco
    external: true

volumes:
  opencodeco-postgres:
    name: opencodeco-postgres
