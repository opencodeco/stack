services:
  opencodeco-kafka:
    container_name: opencodeco-kafka
    image: apache/kafka:3.9.0
    ports:
      - ${KAFKA_PORT}:9092
    volumes:
      - opencodeco-kafka:/var/lib/kafka/data
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://opencodeco-kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@opencodeco-kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  opencodeco-kafka-ui:
    container_name: opencodeco-kafka-ui
    image: ghcr.io/kafbat/kafka-ui:v1.4.2
    ports:
      - ${KAFKA_UI_PORT}:8080
    depends_on:
      opencodeco-kafka:
        condition: service_healthy
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
    volumes:
      - ./kui-config.yml:/etc/kafkaui/dynamic_config.yaml

networks:
  default:
    name: opencodeco
    external: true

volumes:
  opencodeco-kafka:
    name: opencodeco-kafka
